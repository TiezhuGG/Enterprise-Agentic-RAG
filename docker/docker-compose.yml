name: enterprise-agentic-rag

services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-agentic-rag-postgres
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: enterprise-agentic-rag-redis
    env_file:
      - path: ../.env
        required: false
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: enterprise-agentic-rag-minio
    command: server /data --console-address ':9001'
    env_file:
      - path: ../.env
        required: false
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  neo4j:
    image: neo4j:5-community
    container_name: enterprise-agentic-rag-neo4j
    env_file:
      - path: ../.env
        required: false
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:?NEO4J_USERNAME is required}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data

volumes:
  minio_data:
  neo4j_data:
  postgres_data:
  redis_data:
