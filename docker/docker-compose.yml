name: enterprise-agentic-rag

services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-agentic-rag-postgres
    environment:
      POSTGRES_DB: enterprise_agentic_rag
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: enterprise-agentic-rag-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: enterprise-agentic-rag-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  postgres_data:
  redis_data:
